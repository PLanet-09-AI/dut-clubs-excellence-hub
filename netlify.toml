[build]
  command = "npm run build:netlify"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Per-function configuration for office-to-pdf (increase timeout and memory for Chromium)
[functions."office-to-pdf"]
  timeout = 60
  memory = 3008
  # Load these large modules from node_modules at runtime instead of bundling
  external_node_modules = ["@sparticuz/chromium", "puppeteer-core"]

# Route /api/office-to-pdf → Netlify function (must come before the catch-all)
[[redirects]]
  from = "/api/office-to-pdf"
  to = "/.netlify/functions/office-to-pdf"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy (CSP) — prevent XSS and injection attacks
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebasestorage.googleapis.com https://storage.googleapis.com; media-src 'self' https:; frame-src https://www.openstreetmap.org; frame-ancestors 'none';"
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Disable MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Enable XSS protection (legacy header, still useful)
    X-XSS-Protection = "1; mode=block"
    # Enforce HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Referrer policy — don't send referrer to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Feature policy / Permissions policy
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"