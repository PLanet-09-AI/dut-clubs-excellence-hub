[build]
  command = "npm run build:netlify"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Per-function configuration for office-to-pdf (increase timeout and memory for Chromium)
[functions."office-to-pdf"]
  timeout = 60
  memory = 3008
  # Load these large modules from node_modules at runtime instead of bundling
  external_node_modules = ["@sparticuz/chromium", "puppeteer-core"]

# Per-function configuration for html-to-pdf (server-side PDF generation)
[functions."html-to-pdf"]
  timeout = 60
  memory = 3008
  # Load these large modules from node_modules at runtime instead of bundling
  external_node_modules = ["@sparticuz/chromium", "puppeteer-core"]

# Route /api/office-to-pdf → Netlify function (must come before the catch-all)
[[redirects]]
  from = "/api/office-to-pdf"
  to = "/.netlify/functions/office-to-pdf"
  status = 200

# Route /api/html-to-pdf → Netlify function
[[redirects]]
  from = "/api/html-to-pdf"
  to = "/.netlify/functions/html-to-pdf"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200