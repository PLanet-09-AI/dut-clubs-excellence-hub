[build]
  command = "npm run build:netlify"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Increase timeout and memory for Chromium PDF rendering
  timeout = 60
  memory = 3008

# Route /api/office-to-pdf → Netlify function (must come before the catch-all)
[[redirects]]
  from = "/api/office-to-pdf"
  to = "/.netlify/functions/office-to-pdf"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200