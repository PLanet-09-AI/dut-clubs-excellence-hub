<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- Left panel: cream background -->
  <rect width="160" height="100" fill="#F5F0E8"/>

  <!-- DUT geometric mark (top-left of left panel) -->
  <!-- Dark navy/black triangle pointing right -->
  <polygon points="18,18 38,18 28,34" fill="#1a2332"/>
  <!-- Teal/green triangle -->
  <polygon points="28,18 48,18 38,34" fill="#00a896"/>
  <!-- Pink/magenta triangle pointing down -->
  <polygon points="18,34 38,34 28,50" fill="#e91e8c"/>
  <!-- Another dark shape -->
  <polygon points="38,26 52,18 52,34" fill="#1a2332"/>

  <!-- "DUT" large bold text -->
  <text x="56" y="42" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="#1a2332" letter-spacing="-1">DUT</text>

  <!-- "DURBAN UNIVERSITY OF TECHNOLOGY" small text -->
  <text x="18" y="62" font-family="Arial, sans-serif" font-weight="700" font-size="6.5" fill="#1a2332" letter-spacing="0.3">DURBAN UNIVERSITY OF TECHNOLOGY</text>

  <!-- Zulu text -->
  <text x="18" y="72" font-family="Arial, sans-serif" font-weight="400" font-size="5.5" fill="#1a2332" letter-spacing="0.2">INYUVESI YASETHEKWINI TEZOBUCHWEPHESHE</text>

  <!-- Divider line -->
  <line x1="160" y1="0" x2="160" y2="100" stroke="#333" stroke-width="1"/>

  <!-- Right panel: dark charcoal background -->
  <rect x="160" width="160" height="100" fill="#2a2a2a"/>

  <!-- Triangle pattern (subtle) on right panel -->
  <polygon points="160,0 200,0 160,40" fill="#333333"/>
  <polygon points="200,0 240,0 200,40" fill="#323232"/>
  <polygon points="240,0 280,0 240,40" fill="#313131"/>
  <polygon points="280,0 320,0 280,40" fill="#2f2f2f"/>
  <polygon points="160,40 200,40 160,80" fill="#2e2e2e"/>
  <polygon points="200,40 240,40 200,80" fill="#2d2d2d"/>
  <polygon points="240,40 280,40 240,80" fill="#2c2c2c"/>
  <polygon points="160,60 200,60 160,100" fill="#2b2b2b"/>
  <polygon points="200,60 240,60 200,100" fill="#2a2a2a"/>
  <polygon points="240,60 280,60 240,100" fill="#292929"/>
  <polygon points="280,60 320,60 280,100" fill="#282828"/>

  <!-- "STUDENT" text -->
  <text x="240" y="46" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="18" fill="white" text-anchor="middle" letter-spacing="1">STUDENT</text>

  <!-- "SERVICES" text -->
  <text x="240" y="68" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="18" fill="white" text-anchor="middle" letter-spacing="1">SERVICES</text>
</svg>
